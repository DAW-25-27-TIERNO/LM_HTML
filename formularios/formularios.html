<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>

<body>
    <form method="get" action="c.php">
        <!--No tiene cierre (no tiene </input>)-->
        <!-- representa cuadro de entrada de texto-->
        <label for="name">Nombre: </label>
        <input type="text" id="name" name="name" placeholder="Nombre...">
        <br>
        <label for="surname">Apellidos: </label>
        <input type="text" id="surname" name="apellido" value="Sin apellido">
        <br>
        <label for="password">Contraseña: </label>
        <input type="password" id="password" name="password">
        <br>
        <label for="age">Edad: </label>
        <input type="number" id="age" name="age" value="18" required>
        <br>
        <label for="school">Instituto: </label>
        <input type="text" id="school" name="school" value="Tierno" disabled>
        <br>
        <label for="course">Curso: </label>
        <input type="text" id="course" name="course" value="DAW" readonly>
        <br>

        <label for="gender">Género: </label>

        <label for="male">Hombre</label>
        <input type="radio" id="male" name="gender" value="male">

        <label for="female">Mujer</label>
        <input type="radio" id="female" name="gender" value="female">

        <label for="other">Otro</label>
        <input type="radio" id="other" name="gender" value="other">
        <br>

        <p>Asignaturas que voy a aprobar este curso:</p>
        <label for="lm">LM</label>
        <input type="checkbox" id="lm" name="subject" value="lm">
        <label for="bd">BD</label>
        <input type="checkbox" id="bd" name="subject" value="bd">
        <label for="si">SI</label>
        <input type="checkbox" id="si" name="subject" value="si">

        <br>
        <label for="phone">Teléfono: </label>
        <input type="tel" id="phone" name="phone" placeholder="+34">
        <br>
        <label for="email">Correo electrónico: </label>
        <input type="email" id="email" name="email">
        <br>
        <label for="basket">Baloncesto</label>
        <select id="basket" name="basket">
            <option value="lakers">LA Lakers</option>
            <option value="dallas">Dallas Mavericks</option>
            <option value="warriors">Golden State Warriors</option>
        </select>
        <br>
        <label for="color">Color favorito:</label>
        <input type="color" id="color" name="color">
        <br>

        <label for="birthdate">Fecha de nacimiento</label>
        <input type="date" id="birthdate" name="birthdate">

        <br>
        <label for="opinion">Danos tu opinión</label>
        <br>
        <textarea id="opinion" name="opinion" rows="5" cols="33"></textarea>

        <br>
        <input type="submit" value="Enviar formulario">
        <input type="reset" value="Borrar">



    </form>
</body>

</html>
